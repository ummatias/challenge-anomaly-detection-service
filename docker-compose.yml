services:
  app:
    build: .
    container_name: anomaly-api
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - anomaly_storage:/app/storage
    environment:
      STORAGE_ROOT: /app/storage
      MIN_TRAIN_POINTS: ${MIN_TRAIN_POINTS:-30}
      FIT_WORKERS: ${FIT_WORKERS:-4}
      WORKERS: ${WORKERS:-2}
      MPLBACKEND: Agg
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthcheck')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: anomaly-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - app
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    container_name: anomaly-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/anomaly_detection.json
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  anomaly_storage:
  prometheus_data:
  grafana_data:
